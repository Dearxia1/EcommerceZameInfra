name: Deploy Theme to Production
# Manual trigger to retry deployment after timeout

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    # Optional: Build Tailwind CSS before deploying
    # (Uncomment this block if you don't commit build.css and want GitHub to build it)
    # - name: 🔨 Build CSS
    #   run: |
    #     npm install
    #     npx tailwindcss -i ./src/input.css -o ./build.css --minify

    - name: 📂 Sync files (FTP)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ vars.FTP_SERVER }}
        username: ${{ vars.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftp
        security: loose # Relax SSL requirements (accept self-signed/invalid certs)
        timeout: 300000 # 5 minutes to prevent control socket timeout
        log-level: verbose # Debug info
        # The path on the remote server where the theme lives
        # IMPORTANT: Change 'zame-scent' if your remote folder has a different name
        server-dir: /domains/zamescents.com/public_html/wp-content/themes/zame-scents/
        # Exclude node_modules and git files from upload
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/src/**
          tailwind.config.js
          package.json
          package-lock.json
          README.md
