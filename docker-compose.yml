services:
  mysql:
    image: mysql:8.0
    container_name: zame-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: zame_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: password123
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "3307:3306"
    volumes:
      - zame_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ./app
    container_name: zame-app-local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      JWT_SECRET: local-dev-secret-change-me
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: zame_db
      DB_USER: admin
      DB_PASS: password123
      INSTANCE_ID: docker-local
      EPAYCO_MOCK: ${EPAYCO_MOCK:-true}
      EPAYCO_TEST_MODE: ${EPAYCO_TEST_MODE:-true}
      EPAYCO_PUBLIC_KEY: ${EPAYCO_PUBLIC_KEY:-}
      EPAYCO_PRIVATE_KEY: ${EPAYCO_PRIVATE_KEY:-}
      EPAYCO_TEST_PRICE_DIVISOR: ${EPAYCO_TEST_PRICE_DIVISOR:-10}
      EPAYCO_TEST_MAX_AMOUNT: ${EPAYCO_TEST_MAX_AMOUNT:-200000}
      EPAYCO_RESPONSE_URL: ${EPAYCO_RESPONSE_URL:-http://localhost:3000/checkout.html}
      EPAYCO_CONFIRMATION_URL: ${EPAYCO_CONFIRMATION_URL:-http://localhost:3000/api/payments/epayco/confirmation}
    ports:
      - "3000:3000"

volumes:
  zame_mysql_data:
